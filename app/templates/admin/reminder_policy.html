{% extends "base.html" %}

{% block title %}提醒策略配置{% endblock %}

{% block page_class %}page--admin-policy{% endblock %}

{% block content %}
  <section class="scene scene--admin">
    <div class="scene-search scene-search--actions">
      <div class="scene-search__input">在这里查看当前提醒规则，并按需要调整提醒天数。</div>
      <a class="scene-search__ghost" href="/admin/portal">返回管理工作台</a>
      <button id="reload-btn" class="scene-search__button" type="button">重新加载</button>
    </div>

    <div class="scene-columns">
      <section class="glass-card">
        <div class="card-heading"><h2>当前策略</h2></div>
        <div id="policy-summary" class="panel-stack"></div>
      </section>

      <section class="glass-card glass-card--feature">
        <div class="card-heading"><h2>编辑策略</h2></div>
        <div class="inline-form">
          <div class="field">
            <label for="due-days">到期前提醒天数</label>
            <input id="due-days" value="3,1,0" />
          </div>
          <div class="field">
            <label for="overdue-days">逾期后提醒天数</label>
            <input id="overdue-days" value="1,3,7" />
          </div>
          <div class="button-row">
            <button id="save-btn">保存策略</button>
          </div>
          <p class="field-note">用半角逗号分隔天数，例如 `3,1,0` 表示到期前 3 天、1 天和当天提醒。</p>
        </div>
      </section>

      <section class="glass-card">
        <div class="card-heading"><h2>保存反馈</h2></div>
        <div id="feedback-output" class="result-panel result-panel--rich"></div>
      </section>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script>
    const ui = window.LibraryUi;
    const auth = window.LibraryAuth;
    const summaryOutput = document.getElementById('policy-summary');
    const feedbackOutput = document.getElementById('feedback-output');

    function ensureAdminOnly() {
      if (!auth.getRole() || !auth.canUseAdminPortal() || !auth.isAdmin()) {
        window.location.href = '/login';
        return false;
      }
      return true;
    }

    async function adminApi(url, options = {}) {
      if (!ensureAdminOnly()) return null;
      const response = await fetch(url, {
        headers: {
          'Content-Type': 'application/json',
          ...auth.getAdminHeaders(),
          ...(options.headers || {}),
        },
        credentials: 'same-origin',
        ...options,
      });
      return response.json().catch(() => ({
        error: { code: 'HTTP_ERROR', message: 'Server returned a non-JSON response', details: {} },
      }));
    }

    function renderInitialState() {
      ui.render(
        summaryOutput,
        `<div class="feedback-stack">${ui.empty({
          title: '正在加载当前提醒策略',
          description: '这里会展示到期提醒、逾期提醒和当前启用角色。',
        })}</div>`
      );
      ui.render(
        feedbackOutput,
        `<div class="feedback-stack">${ui.empty({
          title: '保存策略后的结果会显示在这里',
          description: '保存成功后，这里会显示最新生效结果。',
        })}</div>`
      );
    }

    function renderPolicy(payload) {
      if (payload?.error) {
        ui.renderError(summaryOutput, payload, [{ href: '/admin/portal', label: '返回工作台' }]);
        return;
      }

      const policy = payload?.data || {};
      document.getElementById('due-days').value = (policy.due_days_before || []).join(',');
      document.getElementById('overdue-days').value = (policy.overdue_days_after || []).join(',');

      ui.render(
        summaryOutput,
        `
          <div class="feedback-stack">
            ${ui.banner({
              tone: 'info',
              title: policy.name || '当前默认策略',
              description: '下面展示的是当前生效中的提醒规则。',
            })}
            ${ui.metricGrid([
              { label: '到期前提醒', value: (policy.due_days_before || []).join(', ') || '无' },
              { label: '逾期后提醒', value: (policy.overdue_days_after || []).join(', ') || '无' },
              { label: '启用角色', value: ui.statusList(policy.enable_for_roles || []) || '无' },
            ])}
          </div>
        `
      );
    }

    function renderSaveFeedback(payload) {
      if (payload?.error) {
        ui.renderError(feedbackOutput, payload, [{ href: '/admin/reminder-policy-page', label: '重新检查输入' }]);
        return;
      }

      const policy = payload?.data || {};
      ui.render(
        feedbackOutput,
        `
          <div class="feedback-stack">
            ${ui.banner({
              tone: 'success',
              title: '提醒策略已更新',
              description: `到期提醒已更新为 ${(policy.due_days_before || []).join(', ')}；逾期提醒已更新为 ${(policy.overdue_days_after || []).join(', ')}。`,
            })}
          </div>
        `
      );
    }

    function parseDays(id) {
      return document
        .getElementById(id)
        .value
        .split(',')
        .map((value) => Number(value.trim()))
        .filter((value) => !Number.isNaN(value));
    }

    async function loadPolicy() {
      const payload = await adminApi('/admin/reminder-policy');
      if (payload) {
        renderPolicy(payload);
      }
    }

    document.getElementById('reload-btn').onclick = loadPolicy;
    document.getElementById('save-btn').onclick = async () => {
      const payload = await adminApi('/admin/reminder-policy', {
        method: 'PUT',
        body: JSON.stringify({
          due_days_before: parseDays('due-days'),
          overdue_days_after: parseDays('overdue-days'),
          enable_for_roles: ['MEMBER', 'ADMIN'],
        }),
      });
      if (payload) {
        renderSaveFeedback(payload);
        if (!payload.error) {
          loadPolicy();
        }
      }
    };

    auth.ready.then(() => {
      if (ensureAdminOnly()) {
        renderInitialState();
        loadPolicy();
      }
    });
  </script>
{% endblock %}
